name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    # Use same environment as deploy so variables/secrets set in "github-pages" are visible here.
    environment:
      name: github-pages
      url: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate required variables
        run: |
          CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}"
          if [ -z "$CLIENT_ID" ]; then
            echo "::error::GOOGLE_CLIENT_ID is missing. Add it in: Settings → Environments → github-pages → Environment variables (or Repository variables), name exactly: GOOGLE_CLIENT_ID"
            exit 1
          fi
          echo "GOOGLE_CLIENT_ID is set (length ${#CLIENT_ID})"

      - name: Generate static site
        run: npm run generate
        env:
          # Build-time public runtime config for Nuxt (static output).
          # Use variable or secret; name in GitHub must be exactly GOOGLE_CLIENT_ID.
          NUXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
          NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          # When deployed to https://user.github.io/<repo>/, Nuxt must use "/<repo>/" as baseURL.
          NUXT_APP_BASE_URL: ${{ vars.BASE_URL || format('/{0}/', github.event.repository.name) }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/.output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
